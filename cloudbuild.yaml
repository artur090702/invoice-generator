steps:
  - name: gcr.io/cloud-builders/docker
    id: Docker Build
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --tag=$_IMAGE_NAME:$COMMIT_SHA
      - --tag=$_IMAGE_NAME:latest
      - --cache-from=$_IMAGE_NAME:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .

  - name: gcr.io/cloud-builders/docker
    id: Docker Push
    args:
      - push
      - --all-tags
      - $_IMAGE_NAME

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Get Credentials
    waitFor: ['-']
    entrypoint: gcloud
    args:
      - container
      - clusters
      - get-credentials
      - $_CLUSTER_NAME
      - --zone=$_CLUSTER_ZONE
      - --project=$PROJECT_ID

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Rollout Restart
    entrypoint: kubectl
    args:
      - rollout
      - restart
      - deployment/invoice-generator
    waitFor: ['Get Credentials', 'Docker Push']

images:
  - $_IMAGE_NAME:$COMMIT_SHA
  - $_IMAGE_NAME:latest

options:
  logging: CLOUD_LOGGING_ONLY
